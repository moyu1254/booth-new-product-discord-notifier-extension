name: Package Extension

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  release:
    types:
      - published

jobs:
  package:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read extension version
        shell: pwsh
        run: |
          $version = (Get-Content manifest.json | ConvertFrom-Json).version
          "EXTENSION_VERSION=$version" >> $env:GITHUB_ENV
          "RELEASE_TAG=v$version" >> $env:GITHUB_ENV

      - name: Build release packages
        shell: pwsh
        run: ./scripts/build-release.ps1

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: booth-extension-packages
          path: dist/packages/*.zip

      - name: Upload release assets
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || contains(github.event.head_commit.message, '[release]')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body_path: docs/release-notes/${{ env.RELEASE_TAG }}.md
          files: dist/packages/*.zip
